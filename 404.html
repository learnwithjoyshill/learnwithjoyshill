<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 // Coordinate Lost | learnwithjoyshill</title>
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <style>
    .error-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
      overflow: hidden;
      background-color: var(--bg-primary);
    }
    
    .error-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(236, 56, 188, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    
    .error-code {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-magenta) 0%, var(--accent-violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      position: relative;
      letter-spacing: -0.05em;
      filter: drop-shadow(var(--shadow-glow-magenta));
      animation: glitch-pulse 2s infinite alternate;
    }
    
    .error-subtitle {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    
    .error-message {
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 40px;
      font-size: 1.05rem;
    }
    
    @keyframes glitch-pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(236, 56, 188, 0.3)); }
      100% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(236, 56, 188, 0.6)); }
    }
  </style>
</head>
<body>
  
  <main class="error-page" aria-label="Error page content">
    <div class="error-glow" aria-hidden="true"></div>
    
    <div class="error-code">404</div>
    <h1 class="error-subtitle">SIGNAL TRANSMISSION LOST</h1>
    <p class="error-message">
      The coordinates you requested do not exist in this sector. The node might have been relocated or purged from the database index.
    </p>
    
    <a href="index.html" class="btn btn-primary" aria-label="Navigate back to Joy Shill's portfolio homepage">
      Return to Main Terminal
    </a>
  </main>

  <script>
    // Simple custom cursor support for 404 page
    const cursor = document.createElement('div');
    cursor.className = 'custom-cursor';
    const cursorDot = document.createElement('div');
    cursorDot.className = 'custom-cursor-dot';
    document.body.appendChild(cursor);
    document.body.appendChild(cursorDot);
    
    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
    
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
    });
    
    const anim = () => {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(anim);
    };
    anim();
    
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  </script>
</body>
</html>
